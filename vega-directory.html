// Build investor list from positions
const investorMap = {};
positions.forEach(p => {
  if (!investorMap[p.invId]) investorMap[p.invId] = { id:p.invId, name:p.name, funds:new Set(), types:new Set(), entities:[], committed:0, positions:[], advisor:"", custodian:"" };
  const inv = investorMap[p.invId];
  inv.funds.add(p.fund);
  inv.types.add(p.type);
  inv.committed += p.amt;
  inv.positions.push(p);
  if (p.advisor) inv.advisor = p.advisor;
  if (p.custodian) inv.custodian = p.custodian;
  if (p.entity) inv.entities.push(p.entity);
});
const investorList = Object.values(investorMap).map(inv => ({
  ...inv,
  funds: Array.from(inv.funds),
  types: Array.from(inv.types),
  entities: [...new Set(inv.entities)],
  compOpen: complianceData.filter(c => c.invId === inv.id && c.status === 'Open').length,
  compliance: complianceData.filter(c => c.invId === inv.id),
  distributions: distData.filter(d => d.invId === inv.id),
  distTotal: distData.filter(d => d.invId === inv.id).reduce((s,d) => s+d.amt, 0),
})).sort((a,b) => a.name.localeCompare(b.name));

                  </div>
                  <div style={{fontSize:20,fontWeight:300,color:'var(--t1)',marginBottom:4}}>{c.name}</div>
                  <div className="mono" style={{fontSize:12,color:'var(--t3)',marginBottom:16}}>{fmt(c.totalAUM)} custodied · {c.investors.length} investors</div>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr>
                      <th className="mono" style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'var(--t4)',padding:'6px 0',textAlign:'left',borderBottom:'1px solid var(--bd)'}}>Investor</th>
                      <th className="mono" style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'var(--t4)',padding:'6px 0',textAlign:'left',borderBottom:'1px solid var(--bd)'}}>Advisor</th>
                    </tr></thead>
                    <tbody>{c.investors.map(inv => (
                      <tr key={inv.id}>
                        <td style={{fontSize:14,padding:'8px 0',color:'var(--t2)',fontWeight:500,borderBottom:'1px solid rgba(30,41,59,0.3)'}}>{inv.name}</td>
                        <td style={{fontSize:13,padding:'8px 0',color:'var(--t3)',borderBottom:'1px solid rgba(30,41,59,0.3)'}}>{inv.advisor||'—'}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <style>{`
        @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--bd);border-radius:3px; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
